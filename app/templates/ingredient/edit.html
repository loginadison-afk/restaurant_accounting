{% extends "base.html" %}

{% block title %}แก้ไขวัตถุดิบ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="fas fa-edit"></i> แก้ไขวัตถุดิบ</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">ชื่อวัตถุดิบ</label>
                        <input type="text" name="name" class="form-control" value="{{ ingredient.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ราคาทั้งชุด (บาท)</label>
                        <input type="number" name="total_cost" class="form-control" step="0.01" value="{{ ingredient.total_cost }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ปริมาณทั้งหมด</label>
                        <input type="number" name="total_quantity" class="form-control" step="0.01" value="{{ ingredient.total_quantity }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">หน่วย</label>
                        <select name="unit" class="form-select">
                            <option value="กรัม" {% if ingredient.unit == 'กรัม' %}selected{% endif %}>กรัม</option>
                            <option value="กิโลกรัม" {% if ingredient.unit == 'กิโลกรัม' %}selected{% endif %}>กิโลกรัม</option>
                            <option value="ลิตร" {% if ingredient.unit == 'ลิตร' %}selected{% endif %}>ลิตร</option>
                            <option value="ชิ้น" {% if ingredient.unit == 'ชิ้น' %}selected{% endif %}>ชิ้น</option>
                            <option value="ขีด" {% if ingredient.unit == 'ขีด' %}selected{% endif %}>ขีด</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> อัปเดตวัตถุดิบ
                        </button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('ingredient.list_ingredients') }}" class="btn btn-secondary btn-sm">
                        <i class="fas fa-arrow-left"></i> กลับ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
